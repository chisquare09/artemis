    - type: vocabulary
      content: Languages
    - type: vocabulary
      content: Professions
    - type: listening
      content: Understand simple personal introductions
    - type: speaking
      content: Conduct a short introduction exchange
    - type: reading
      content: Understand a short personal profile
    - type: writing
      content: Complete a personal information form
