curriculum:
  title: Full Italian Curriculum A1 to B2
  description: Integrated CEFR-aligned Italian curriculum from A1 to B2
  language: Italian
  version: 0.2.0
study_modes:
- code: daily_communication
  name: Daily Communication
  description: Practical Italian for everyday listening, speaking, and conversation
- code: academic_purpose
  name: Academic Purpose
  description: Structured Italian study for reading, writing, grammar, and certification preparation
levels:
- code: A1
  name: Beginner / Breakthrough
  order_index: 1
  goal: Handle very simple communication, introduce yourself, ask basic questions, understand slow speech, read signs and menus, and write short personal messages.
  exit_outcomes:
  - Introduce yourself
  - Ask and answer simple questions
  - Order food
  - Ask for directions
  - Describe family and routine
  - Understand slow, clear speech
  - Write short simple texts
  units:
  - code: A1.1
    title: Sounds, Alphabet, and First Contact
    summary: Learn Italian sounds, alphabet, and basic greetings.
    order_index: 1
    objectives:
    - type: communicative_goal
      content: Greet people formally and informally
    - type: communicative_goal
      content: Say goodbye
    - type: communicative_goal
      content: Say please, thank you, sorry
    - type: communicative_goal
      content: Ask How are you
    - type: communicative_goal
      content: Introduce your name
    - type: grammar
      content: Italian alphabet
    - type: grammar
      content: Vowels and consonants
    - type: grammar
      content: Double consonants
    - type: grammar
      content: Stress and syllables
    - type: grammar
      content: Basic sentence order
    - type: grammar
      content: Subject pronouns io, tu, lui, lei, noi, voi, loro
    - type: vocabulary
      content: Greetings
    - type: vocabulary
      content: Polite expressions
    - type: vocabulary
      content: Countries and nationalities
    - type: vocabulary
      content: Basic classroom phrases
    - type: listening
      content: Recognize greetings
    - type: listening
      content: Identify names and countries
    - type: listening
      content: Understand very slow introductions
    - type: speaking
      content: Introduce yourself in 3-5 sentences
    - type: speaking
      content: Spell your name
    - type: speaking
      content: Ask someone name and nationality
    - type: reading
      content: Read basic signs and classroom instructions
    - type: writing
      content: Write a short self-introduction
    - type: culture
      content: Formal vs informal greetings ciao vs buongiorno
    - type: culture
      content: Basic use of tu and Lei
    activities:
    - activity_type: intro
      title: Lesson overview
      description: Understand the goals of Sounds, Alphabet, and First Contact
      skill_focus: integrated
      order_index: 1
    - activity_type: vocabulary
      title: Key vocabulary
      description: Learn essential vocabulary for Sounds, Alphabet, and First Contact
      skill_focus: reading
      order_index: 2
    - activity_type: reading
      title: Reading practice
      description: Read texts related to Sounds, Alphabet, and First Contact
      skill_focus: reading
      order_index: 3
    - activity_type: listening
      title: Listening practice
      description: Listen to dialogues about Sounds, Alphabet, and First Contact
      skill_focus: listening
      order_index: 4
    - activity_type: speaking
      title: Speaking roleplay
      description: Practice speaking scenarios for Sounds, Alphabet, and First Contact
      skill_focus: speaking
      order_index: 5
    - activity_type: writing
      title: Writing exercise
      description: Write about topics from Sounds, Alphabet, and First Contact
      skill_focus: writing
      order_index: 6
    - activity_type: quiz
      title: Review quiz
      description: Test your knowledge of Sounds, Alphabet, and First Contact
      skill_focus: integrated
      order_index: 7
