- code: A2
  name: Elementary / Waystage
  order_index: 2
  goal: Handle routine daily situations independently including travel, shopping, appointments, health, housing, work basics, and simple past events.
  exit_outcomes:
  - Handle routine travel and daily-life interactions
  - Talk about past experiences
  - Describe habits and memories
  - Make plans
  - Understand short simple texts
  - Write short personal and practical messages
  units:
  - code: A2.1
    title: 'Past Experiences: Passato Prossimo'
    summary: Talk about what you did and past events.
    order_index: 1
    objectives:
    - type: communicative_goal
      content: Talk about what you did yesterday
    - type: communicative_goal
      content: Talk about past trips
    - type: communicative_goal
      content: Ask others about past events
    - type: grammar
      content: Passato prossimo
    - type: grammar
      content: Auxiliary verbs essere and avere
    - type: grammar
      content: Past participles
    - type: grammar
      content: Agreement with essere
    - type: grammar
      content: Common irregular past participles
    - type: vocabulary
      content: Yesterday, last week, last year
    - type: vocabulary
      content: Travel experiences
    - type: vocabulary
      content: Weekend activities
    - type: vocabulary
      content: Events
    - type: listening
      content: Understand simple past narratives
    - type: speaking
      content: Tell what you did last weekend
    - type: reading
      content: Read a simple travel blog entry
    - type: writing
      content: Write a short past-event paragraph
    activities:
    - activity_type: intro
      title: Lesson overview
      description: 'Understand the goals of Past Experiences: Passato Prossimo'
      skill_focus: integrated
      order_index: 1
    - activity_type: vocabulary
      title: Key vocabulary
      description: 'Learn essential vocabulary for Past Experiences: Passato Prossimo'
      skill_focus: reading
      order_index: 2
    - activity_type: reading
      title: Reading practice
      description: 'Read texts related to Past Experiences: Passato Prossimo'
      skill_focus: reading
      order_index: 3
    - activity_type: listening
      title: Listening practice
      description: 'Listen to dialogues about Past Experiences: Passato Prossimo'
      skill_focus: listening
      order_index: 4
    - activity_type: speaking
      title: Speaking roleplay
      description: 'Practice speaking scenarios for Past Experiences: Passato Prossimo'
      skill_focus: speaking
      order_index: 5
    - activity_type: writing
      title: Writing exercise
      description: 'Write about topics from Past Experiences: Passato Prossimo'
      skill_focus: writing
      order_index: 6
